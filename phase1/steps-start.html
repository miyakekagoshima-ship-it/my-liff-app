<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歩数の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f0f8ff; color: #333; }
        .header { text-align: center; margin-bottom: 25px; }
        .period-title { font-size: 16px; color: #fff; background-color: #007BFF; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold;}
        .desc { font-size: 14px; color: #555; background: #fff; padding: 12px; border-radius: 8px; border-left: 4px solid #007BFF; text-align: left; margin-bottom: 20px;}
        .day-card { background: #fff; border: 1px solid #d0e3f5; border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .day-card h3 { margin: 0 0 15px 0; font-size: 18px; color: #0056b3; border-bottom: 2px solid #f0f8ff; padding-bottom: 8px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        input[type="number"] { padding: 12px; border: 2px solid #007BFF; border-radius: 10px; font-size: 18px; width: 100px; text-align: right; }
        .submit-btn { width: 100%; padding: 18px; background-color: #007BFF; color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .completed-msg { text-align: center; color: #0056b3; font-size: 18px; font-weight: bold; padding: 40px 20px; background-color: #e6f2ff; border-radius: 15px; border: 2px solid #007BFF; }
    </style>
</head>
<body>
    <div class="header">
        <span class="period-title">【開始】歩数の記録</span>
        <div class="desc">スマートウォッチの連携アプリを確認して入力してください。</div>
    </div>
    <div id="form-wrapper">
        <form id="stepForm"><div id="inputs-container"></div><button type="submit" id="submitBtn" class="submit-btn" disabled>読み込み中...</button></form>
    </div>
    <div id="completed-msg" style="display: none;"><div class="completed-msg">✅ 送信が完了しました。</div><button style="width:100%;margin-top:20px;padding:15px;" onclick="liff.closeWindow()">閉じる</button></div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-1n6QIM_g4ymsnsZsI-zPJEREJI8wFINnp9j3bd1BHrUTh43p9pSct5tA4hMbd4GU/exec";
        const periodName = "開始"; 
        const recordDates = ["8/3(月)", "8/4(火)", "8/5(水)", "8/6(木)", "8/7(金)", "8/8(土)", "8/9(日)"];
        const storageKey = `submitted_steps_${periodName}`;
        if (localStorage.getItem(storageKey) === 'true') { document.getElementById('form-wrapper').innerHTML = `<div class="completed-msg">すでに送信済みです。</div>`; }
        const container = document.getElementById('inputs-container');
        recordDates.forEach((date, i) => { container.innerHTML += `<div class="day-card"><h3>${date}</h3><div class="input-row"><span>🚶‍♂️ 歩数</span><div><input type="number" id="step-${i}" min="0" max="100000" required><span>歩</span></div></div></div>`; });
        liff.init({ liffId: "2009684447-p1k1lcRv" }).then(() => { if (!liff.isLoggedIn()) { liff.login(); } else { liff.getProfile().then(p => { userId = p.userId; document.getElementById('submitBtn').disabled = false; document.getElementById('submitBtn').innerText = "送信する"; }); } });
        document.getElementById('stepForm').addEventListener('submit', function(e) {
            e.preventDefault(); const btn = document.getElementById('submitBtn'); btn.disabled = true;
            let stepData = []; let msgText = `📅 【${periodName}の歩数】\n`;
            recordDates.forEach((d, i) => { let v = document.getElementById(`step-${i}`).value; stepData.push({ period: periodName, date: d, steps: v }); msgText += `${d}：${v}歩\n`; });
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ userId: userId, type: 'step_record', value: stepData }) })
            .then(r => r.json()).then(() => { localStorage.setItem(storageKey, 'true'); if (liff.isInClient()) { liff.sendMessages([{ 'type': 'text', 'text': msgText }]).then(() => { location.reload(); }); } else { location.reload(); } });
        });
    </script>
</body>
</html>
