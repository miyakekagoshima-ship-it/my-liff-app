<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歩数の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f0f8ff; color: #333; }
        .header { text-align: center; margin-bottom: 25px; }
        .period-title { font-size: 16px; color: #fff; background-color: #007BFF; padding: 5px 15px; border-radius: 20px; display: inline-block; font-weight: bold;}
        .day-card { background: #fff; border: 1px solid #d0e3f5; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        input[type="number"] { padding: 10px; border: 2px solid #007BFF; border-radius: 8px; font-size: 18px; width: 90px; text-align: right; }
        .submit-btn { width: 100%; padding: 18px; background-color: #007BFF; color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; }
        .completed-msg { text-align: center; color: #0056b3; font-size: 18px; font-weight: bold; padding: 40px 20px; background-color: #e6f2ff; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="header"><span class="period-title">【開始】歩数の記録</span></div>
    <div id="form-wrapper">
        <form id="stepForm"><div id="inputs-container"></div><button type="submit" id="submitBtn" class="submit-btn" disabled>読み込み中...</button></form>
    </div>
    <div id="completed-msg" style="display:none;"><div class="completed-msg">✅ 送信が完了しました。</div><button style="width:100%;margin-top:20px;padding:15px;" onclick="liff.closeWindow()">閉じる</button></div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-1n6QIM_g4ymsnsZsI-zPJEREJI8wFINnp9j3bd1BHrUTh43p9pSct5tA4hMbd4GU/exec";
        const dates = ["8/3(月)", "8/4(火)", "8/5(水)", "8/6(木)", "8/7(金)", "8/8(土)", "8/9(日)"];
        const container = document.getElementById('inputs-container');
        dates.forEach((d, i) => { container.innerHTML += `<div class="day-card"><h3>${d}</h3><div class="input-row"><span>🚶‍♂️ 歩数</span><div><input type="number" id="step-${i}" required><span>歩</span></div></div></div>`; });
        liff.init({ liffId: "2009895376-lm1f53Xo" }).then(() => { if (liff.isLoggedIn()) { liff.getProfile().then(p => { userId = p.userId; document.getElementById('submitBtn').disabled = false; document.getElementById('submitBtn').innerText = "送信する"; }); } else { liff.login(); } });
        document.getElementById('stepForm').addEventListener('submit', function(e) {
            e.preventDefault(); let stepData = []; let msg = `📅 【開始の歩数記録】\n`;
            dates.forEach((d, i) => { let v = document.getElementById(`step-${i}`).value; stepData.push({ period:'開始', date:d, steps:v }); msg += `${d}：${v}歩\n`; });
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ userId: userId, type: 'step_record', value: stepData }) })
            .then(r => r.json()).then(() => { liff.sendMessages([{ 'type': 'text', 'text': msg }]).then(() => { document.getElementById('form-wrapper').style.display='none'; document.getElementById('completed-msg').style.display='block'; }); });
        });
    </script>
</body>
</html>
