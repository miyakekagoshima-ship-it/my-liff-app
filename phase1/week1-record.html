<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第1週 お茶の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f0fdf4; color: #333; }
        .header { text-align: center; margin-bottom: 25px; }
        .period-title { font-size: 18px; color: #fff; background-color: #16a34a; padding: 8px 20px; border-radius: 25px; display: inline-block; font-weight: bold;}
        .input-card { background: #fff; border-radius: 15px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        select { width: 100%; padding: 15px; border: 2px solid #16a34a; border-radius: 12px; font-size: 20px; font-weight: bold; }
        .submit-btn { width: 100%; padding: 18px; background-color: #16a34a; color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="period-title">第1週 (8/3[月]〜8/6[木])</span>
        <div style="margin-top:15px; font-size:15px; line-height:1.6;">袋に残っている<b>本数（0〜8本）</b>を教えてください。</div>
    </div>
    <div id="form-wrapper">
        <form id="teaForm">
            <div class="input-card"><label style="display:block;margin-bottom:15px;color:#16a34a;font-weight:bold;">袋に残っている本数</label>
                <select id="teaRemaining" required><option value="" disabled selected>選択してください</option>
                <script>for(let i=0; i<=8; i++) { document.write(`<option value="${i}本">${i} 本</option>`); }</script></select>
            </div>
            <button type="submit" id="submitBtn" class="submit-btn" disabled>読み込み中...</button>
        </form>
    </div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-1n6QIM_g4ymsnsZsI-zPJEREJI8wFINnp9j3bd1BHrUTh43p9pSct5tA4hMbd4GU/exec";
        liff.init({ liffId: "2009895376-eQWjoZ0Q" }).then(() => { if (liff.isLoggedIn()) { liff.getProfile().then(p => { userId = p.userId; document.getElementById('submitBtn').disabled = false; document.getElementById('submitBtn').innerText = "送信する"; }); } else { liff.login(); } });
        document.getElementById('teaForm').addEventListener('submit', function(e) {
            e.preventDefault(); const val = document.getElementById('teaRemaining').value;
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ userId: userId, type: 'weekly_record', value: [{ week: '第1週', date: '8/3-8/6', tea: val }] }) })
            .then(r => r.json()).then(() => { liff.sendMessages([{ 'type': 'text', 'text': `📅 【お茶の記録：第1週】\n袋の残数：${val}` }]).then(() => liff.closeWindow()); });
        });
    </script>
</body>
</html>
