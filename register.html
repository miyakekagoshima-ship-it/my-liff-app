<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お茶と健康の研究（よかチャレⅡ）登録フォーム</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; color: #333; }
        h2 { text-align: center; font-size: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .required { color: red; font-size: 12px; margin-left: 5px; }
        input[type="text"], input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .checkbox-group { display: flex; align-items: flex-start; margin-top: 10px; background-color: #fff; padding: 15px; border-radius: 5px; border: 1px solid #ddd; }
        .checkbox-group input { margin-top: 4px; margin-right: 10px; transform: scale(1.3); }
        .submit-btn { width: 100%; padding: 15px; background-color: #00B900; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #completed-msg { display: none; text-align: center; color: #008000; font-size: 18px; font-weight: bold; padding: 30px 20px; background-color: #f0fff0; border-radius: 10px; border: 1px solid #008000; margin-top: 20px; }
        #form-wrapper { background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .close-btn { width: 100%; padding: 15px; background-color: #666; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>お茶と健康の研究<br>（よかチャレⅡ）登録フォーム</h2>

    <div id="form-wrapper">
        <form id="registerForm">
            <div class="form-group">
                <label>氏名（漢字）<span class="required">※必須</span></label>
                <input type="text" id="nameKanji" placeholder="例：山田 太郎" required>
            </div>

            <div class="form-group">
                <label>氏名（フリガナ）<span class="required">※必須</span></label>
                <input type="text" id="nameKana" placeholder="例：ヤマダ タロウ" required>
            </div>

            <div class="form-group">
                <label>生年月日<span class="required">※必須</span></label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label>受付番号<span class="required">※必須</span></label>
                <p style="font-size: 12px; color: #666; margin: 0 0 5px 0;">※会場で案内された受付番号を入力してください</p>
                <input type="text" id="receiptNumber" placeholder="例：12345" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="consent" required>
                <label for="consent" style="font-weight: normal;">研究への参加に同意します<span class="required">※必須</span></label>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">登録する</button>
        </form>
    </div>

    <div id="completed-msg">
        ✅ 登録が完了しました。<br>ご協力ありがとうございます。
        <br>
        <button class="close-btn" onclick="liff.closeWindow()">画面を閉じる</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxrxgT6OwQa5WNKiOIzY36dWUhskOX6Q6drJvvXiJwJuG_zlHwswpvhg4CIG6Hu-Mnqvw/exec";
        let userId = "";

        // 設定していただいた登録フォーム用のLIFF ID
        liff.init({ liffId: "2009551698-7d1vy9Ej" }) 
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    userId = liff.getDecodedIDToken().sub;
                }
            });

        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "送信中...";

            const formData = {
                name: document.getElementById('nameKanji').value,
                kana: document.getElementById('nameKana').value,
                dob: document.getElementById('dob').value,
                receipt: document.getElementById('receiptNumber').value
            };

            const data = { userId: userId, type: 'register', value: formData };

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                // 通信が完了したら入力フォームを隠して完了メッセージを出す
                document.getElementById('form-wrapper').style.display = 'none';
                document.getElementById('completed-msg').style.display = 'block';
            }).catch(err => {
                alert("エラーが発生しました: " + err);
                submitBtn.disabled = false;
                submitBtn.innerText = "登録する";
            });
        });
    </script>
</body>
</html>
