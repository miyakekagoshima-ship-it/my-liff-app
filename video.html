<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体操動画の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { width: 80%; padding: 15px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc; }
        .video-btn { background-color: #eaf4ff; }
        .finish-btn { background-color: #ffeaea; color: red; font-weight: bold; transition: 0.3s; }
        .finish-btn:disabled { background-color: #e0e0e0; color: #888; cursor: not-allowed; border: 1px solid #ccc; }
        #video-container { margin-top: 30px; display: none; }
        #youtube-player { width: 100%; height: 250px; border: none; border-radius: 10px; }
        .completed-msg { color: #008000; font-size: 18px; font-weight: bold; padding: 20px; background-color: #f0fff0; border-radius: 10px; margin: 10px; border: 1px solid #008000; }
    </style>
</head>
<body>

    <h2>🏃‍♂️ 体操動画を見る</h2>
    <div id="video-section">
        <p>難易度を選んでください</p>
        <button class="video-btn" onclick="showVideo('かんたん', 'QjmdV01-TqI')">かんたん（再生）</button>
        <button class="video-btn" onclick="showVideo('ふつう', 'hKxXh1GrRjI')">ふつう（再生）</button>
        <button class="video-btn" onclick="showVideo('むずかしい', 'qP3jtYbfUK0')">むずかしい（再生）</button>
    </div>

    <div id="video-container">
        <h3 id="video-title"></h3>
        <div id="youtube-player"></div>
        <br>
        <button id="finish-btn" class="finish-btn" onclick="finishVideo()" disabled>動画を最後まで見ると押せます</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxrxgT6OwQa5WNKiOIzY36dWUhskOX6Q6drJvvXiJwJuG_zlHwswpvhg4CIG6Hu-Mnqvw/exec";
        let userId = "";
        let currentLevel = ""; 
        let player;

        function getTodayString() {
            const now = new Date();
            return now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
        }

        function checkDailyLimit() {
            if (localStorage.getItem('last_video_date') === getTodayString()) {
                document.getElementById('video-section').innerHTML = '<div class="completed-msg">✅ 本日の体操は完了しています</div>';
                document.getElementById('video-container').style.display = 'none';
            }
        }

        document.addEventListener("DOMContentLoaded", checkDailyLimit);

        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // ★注意: ここには新しいLIFF IDを入れる必要があります（ステップ3で取得します）
        liff.init({ liffId: '2009551698-KgukTtVZ' }) 
            .then(() => {
                checkDailyLimit();
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    userId = liff.getDecodedIDToken().sub;
                }
            });

        function sendData(level) {
            localStorage.setItem('last_video_date', getTodayString());
            if (player && typeof player.stopVideo === 'function') {
                player.stopVideo(); 
            }
            checkDailyLimit();

            const data = { userId: userId, type: 'video', value: level };
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                alert("記録しました！お疲れ様でした！");
            }).catch(err => alert("エラー: " + err));
        }

        function showVideo(level, videoId) {
            currentLevel = level;
            document.getElementById('video-title').innerText = level + "コース";
            
            const finishBtn = document.getElementById('finish-btn');
            finishBtn.disabled = true;
            finishBtn.innerText = "動画を最後まで見ると押せます";
            document.getElementById('video-container').style.display = 'block';
            
            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('youtube-player', {
                    height: '250',
                    width: '100%',
                    videoId: videoId,
                    playerVars: { 'playsinline': 1, 'rel': 0 },
                    events: { 'onStateChange': onPlayerStateChange }
                });
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                const finishBtn = document.getElementById('finish-btn');
                finishBtn.disabled = false;
                finishBtn.innerText = "体操おわった！（記録する）";
            }
        }

        function finishVideo() {
            sendData(currentLevel); 
        }
    </script>
</body>
</html>
