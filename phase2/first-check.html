<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よか茶レ！ 初回測定会</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; color: #333; }
        h2 { text-align: center; font-size: 20px; color: #2c3e50; line-height: 1.4; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .required { color: red; font-size: 12px; margin-left: 5px; }
        .note { font-size: 13px; color: #e65100; margin-bottom: 10px; font-weight: bold; } 
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; background-color: #fff;}
        .choice-group { display: flex; flex-direction: column; gap: 10px; }
        .choice-label { display: block; text-align: center; background-color: #f0f0f0; padding: 12px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        input[type="radio"], input[type="checkbox"] { display: none; }
        input[type="radio"]:checked + .choice-label, input[type="checkbox"]:checked + .choice-label { background-color: #eaffea; border-color: #00B900; color: #00B900; }
        
        input[type="checkbox"]:disabled + .choice-label { background-color: #e0e0e0; color: #999; cursor: not-allowed; border-color: #ccc; }

        .submit-btn { width: 100%; padding: 15px; background-color: #00B900; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .submit-btn:disabled { background-color: #cccccc; cursor: not-allowed; color: #666666; }
        
        #completed-msg { display: none; text-align: center; color: #008000; font-size: 18px; font-weight: bold; padding: 30px 20px; background-color: #f0fff0; border-radius: 10px; border: 1px solid #008000; margin-top: 20px; }
        #form-wrapper { background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .close-btn { width: 100%; padding: 15px; background-color: #666; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>よか茶レ！ 初回測定会</h2>
    <div id="form-wrapper">
        <form id="firstCheckForm">
            <div class="form-group"><label>氏名（漢字）<span class="required">※必須</span></label><input type="text" id="nameKanji" placeholder="例：山田 太郎" required></div>
            <div class="form-group"><label>生年月日<span class="required">※必須</span></label><input type="date" id="dob" required></div>
            
            <div class="form-group">
                <label>R8 たるみず元気プロジェクト参加：<span class="required">※必須</span></label>
                <div class="choice-group">
                    <input type="radio" id="partYes" name="project2026" value="参加済み（参加予定）" required>
                    <label for="partYes" class="choice-label">参加済み（参加予定）</label>
                    
                    <input type="radio" id="partNo" name="project2026" value="未参加" required>
                    <label for="partNo" class="choice-label">未参加</label>
                </div>
            </div>

            <div class="form-group">
                <label>初回測定会（11/23）の希望時間（複数選択可）<span class="required">※必須</span></label>
                <div class="note">※測定の所要時間は1時間程度を予定しております。</div>
                <div class="choice-group">
                    <input type="checkbox" id="timeAM" name="hopeTime" value="午前の部(9時～12時)" disabled><label for="timeAM" class="choice-label">午前の部 (9時～12時)</label>
                    <input type="checkbox" id="timePM" name="hopeTime" value="午後の部(13時～15時)"><label for="timePM" class="choice-label">午後の部 (13時～15時)</label>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="submit-btn" disabled>読み込み中...</button>
        </form>
    </div>

    <div id="completed-msg">
        ✅ 送信が完了しました。<br>ご協力ありがとうございます。<br><br>
        <div style="font-size: 14px; color: #444; line-height: 1.6; text-align: left; background-color: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ccc;">
            測定会の詳細な日時につきましては、1カ月前の<strong>10月23日（金）</strong>にこちらのLINEにて個別にご案内いたします。
        </div>
        <button class="close-btn" onclick="liff.closeWindow()">画面を閉じる</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx_dvHCMmzScTxeRPH3i09xaojiZa9W7Qrbiu7GvtZUWjJoo2rUZi70mTqsy0cxI4Rs/exec";
        let userId = "";

        liff.init({ liffId: "2010463622-5b0fgy7n" }).then(() => {
            if (!liff.isLoggedIn()) { 
                liff.login({ redirectUri: window.location.href }); 
            } else {
                liff.getProfile().then(p => { 
                    userId = p.userId; 
                    document.getElementById('submitBtn').disabled = false; 
                    document.getElementById('submitBtn').innerText = "送信する"; 
                }).catch(err => {
                    alert("LINE情報の取得に失敗しました。画面を開き直してください。");
                });
            }
        });

        document.getElementById('firstCheckForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const times = Array.from(document.querySelectorAll('input[name="hopeTime"]:checked')).map(el => el.value);
            
            if (times.length === 0) { 
                alert("希望時間を選択してください"); 
                return; 
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "送信中...";

            const formData = {
                name: document.getElementById('nameKanji').value,
                dob: document.getElementById('dob').value,
                time: times.join('、'),
                participated: document.querySelector('input[name="project2026"]:checked').value
            };

            fetch(GAS_URL, { 
                method: "POST", 
                body: JSON.stringify({ userId: userId, type: 'first_check', value: formData }) 
            })
            .then(response => response.json())
            .then(res => {
                if(res.error) {
                    alert("エラーが発生しました:\n" + res.error);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "送信する";
                } else {
                    let msg = `📝 【よか茶レ！ 初回測定会】\n氏名：${formData.name}\n希望：${formData.time}\nR8 たるみず元気プロジェクト参加：${formData.participated}`;
                    if (liff.isInClient()) {
                        liff.sendMessages([{ 'type': 'text', 'text': msg }]).then(() => { 
                            document.getElementById('form-wrapper').style.display='none'; 
                            document.getElementById('completed-msg').style.display='block'; 
                        }).catch(err => console.log(err));
                    } else {
                        document.getElementById('form-wrapper').style.display='none'; 
                        document.getElementById('completed-msg').style.display='block'; 
                    }
                }
            })
            .catch(err => {
                alert("送信エラー: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "送信する";
            });
        });
    </script>
</body>
</html>
