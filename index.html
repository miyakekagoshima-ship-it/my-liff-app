<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お茶の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { width: 80%; padding: 15px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc; }
        .tea-btn { background-color: #eaffea; }
        .completed-msg { color: #008000; font-size: 18px; font-weight: bold; padding: 20px; background-color: #f0fff0; border-radius: 10px; margin: 10px; border: 1px solid #008000; }
    </style>
</head>
<body>

    <h2>🍵 お茶の記録</h2>
    <div id="tea-section">
        <p>今日飲んだ本数を教えてください</p>
        <button class="tea-btn" onclick="sendData(0)">0本</button>
        <button class="tea-btn" onclick="sendData(1)">1本</button>
        <button class="tea-btn" onclick="sendData(2)">2本</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxrxgT6OwQa5WNKiOIzY36dWUhskOX6Q6drJvvXiJwJuG_zlHwswpvhg4CIG6Hu-Mnqvw/exec";
        let userId = "";

        function getTodayString() {
            const now = new Date();
            return now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
        }

        function checkDailyLimit() {
            if (localStorage.getItem('last_tea_date') === getTodayString()) {
                document.getElementById('tea-section').innerHTML = '<div class="completed-msg">✅ 本日のお茶の記録は完了しています</div>';
            }
        }

       // ▼ 1箇所目：画面が開いた時のチェックを無効化
        // document.addEventListener("DOMContentLoaded", checkDailyLimit);

        // ※お茶用のLIFF IDはそのまま使います
        liff.init({ liffId: "2009559911-f5a6WxHg" }) 
            .then(() => {
                // ▼ 2箇所目：LIFF読み込み後のチェックを無効化
                // checkDailyLimit();
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    userId = liff.getDecodedIDToken().sub;
                }
            });

        function sendData(value) {
// ▼ この2行の先頭に // をつけて無効化します
            // localStorage.setItem('last_tea_date', getTodayString());
            // checkDailyLimit();

            const data = { userId: userId, type: 'tea', value: value };
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                // ▼▼▼ ここから追加・変更 ▼▼▼
                // ※ value の部分は、取得したお茶の杯数の変数名を入れてください
                let msgText = '🍵 【お茶の記録】\n本日：' + value + '杯 飲みました！';

                if (liff.isInClient()) {
                    liff.sendMessages([{ 'type': 'text', 'text': msgText }]).then(() => {
                        document.getElementById('form-wrapper').style.display = 'none';
                        document.getElementById('completed-msg').style.display = 'block';
                    }).catch((err) => {
                        document.getElementById('form-wrapper').style.display = 'none';
                        document.getElementById('completed-msg').style.display = 'block';
                    });
                } else {
                    document.getElementById('form-wrapper').style.display = 'none';
                    document.getElementById('completed-msg').style.display = 'block';
                }
                alert("記録しました！お疲れ様でした！");
            }).catch(err => alert("エラー: " + err));
        }
    </script>
</body>
</html>
