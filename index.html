<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お茶と体操の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { width: 80%; padding: 15px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc; }
        .tea-btn { background-color: #eaffea; }
        .video-btn { background-color: #eaf4ff; }
        
        /* 完了ボタンのスタイル */
        .finish-btn { background-color: #ffeaea; color: red; font-weight: bold; transition: 0.3s; }
        /* 押せない状態（disabled）の時のスタイル */
        .finish-btn:disabled { background-color: #e0e0e0; color: #888; cursor: not-allowed; border: 1px solid #ccc; }
        
        #video-container { margin-top: 30px; display: none; }
        /* APIが生成するiframe用 */
        #youtube-player { width: 100%; height: 250px; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h2>🍵 お茶の記録</h2>
    <p>今日飲んだ本数を教えてください</p>
    <button class="tea-btn" onclick="sendData('tea', 0)">0本</button>
    <button class="tea-btn" onclick="sendData('tea', 1)">1本</button>
    <button class="tea-btn" onclick="sendData('tea', 2)">2本</button>

    <hr>

    <h2>🏃‍♂️ 体操動画を見る</h2>
    <p>難易度を選んでください</p>
    <button class="video-btn" onclick="showVideo('かんたん', 'QjmdV01-TqI')">かんたん（再生）</button>
    <button class="video-btn" onclick="showVideo('ふつう', 'hKxXh1GrRjI')">ふつう（再生）</button>
    <button class="video-btn" onclick="showVideo('むずかしい', 'qP3jtYbfUK0')">むずかしい（再生）</button>

    <div id="video-container">
        <h3 id="video-title"></h3>
        <div id="youtube-player"></div>
        <br>
        <button id="finish-btn" class="finish-btn" onclick="finishVideo()" disabled>動画を最後まで見ると押せます</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxrxgT6OwQa5WNKiOIzY36dWUhskOX6Q6drJvvXiJwJuG_zlHwswpvhg4CIG6Hu-Mnqvw/exec";
        let userId = "";
        let currentLevel = ""; 
        let player; // YouTubeプレーヤーを格納する変数

        // YouTube IFrame Player API の読み込み
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        liff.init({ liffId: "2009551698-vafUFmck" }) 
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    userId = liff.getDecodedIDToken().sub;
                }
            });

        function sendData(type, value) {
            const data = { userId: userId, type: type, value: value };
            
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                alert("記録しました！お疲れ様でした！");
                if(type === 'video') {
                    document.getElementById('video-container').style.display = 'none';
                    if (player) {
                        player.stopVideo(); // 記録後に動画を停止する
                    }
                }
            }).catch(err => alert("エラー: " + err));
        }

        function showVideo(level, videoId) {
            currentLevel = level;
            document.getElementById('video-title').innerText = level + "コース";
            
            // ボタンを押せない状態にリセット
            const finishBtn = document.getElementById('finish-btn');
            finishBtn.disabled = true;
            finishBtn.innerText = "動画を最後まで見ると押せます";
            
            document.getElementById('video-container').style.display = 'block';
            
            // すでにプレーヤーが作られている場合は動画を切り替えるだけ
            if (player) {
                player.loadVideoById(videoId);
            } else {
                // 初めて動画を再生するときにプレーヤーを作成する
                player = new YT.Player('youtube-player', {
                    height: '250',
                    width: '100%',
                    videoId: videoId,
                    playerVars: {
                        'playsinline': 1, // スマホで全画面にならずインライン再生
                        'rel': 0          // 関連動画を同じチャンネルに限定
                    },
                    events: {
                        'onStateChange': onPlayerStateChange // 状態が変わった時に呼ぶ関数を指定
                    }
                });
            }

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // 動画の再生状態が変わった時に自動で呼ばれる関数
        function onPlayerStateChange(event) {
            // YT.PlayerState.ENDED (0) は動画が最後まで再生された状態
            if (event.data === YT.PlayerState.ENDED) {
                const finishBtn = document.getElementById('finish-btn');
                finishBtn.disabled = false; // ボタンを押せるようにする
                finishBtn.innerText = "体操おわった！（記録する）";
            }
        }

        function finishVideo() {
            sendData('video', currentLevel); 
        }
    </script>
</body>
</html>
