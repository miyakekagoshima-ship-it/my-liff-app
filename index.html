<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お茶と体操の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { width: 80%; padding: 15px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc; }
        .tea-btn { background-color: #eaffea; }
        .video-btn { background-color: #eaf4ff; }
    </style>
</head>
<body>

    <h2>お茶を何本飲みましたか？</h2>
    <button class="tea-btn" onclick="sendData('tea', 0)">0本</button>
    <button class="tea-btn" onclick="sendData('tea', 1)">1本</button>
    <button class="tea-btn" onclick="sendData('tea', 2)">2本</button>

    <hr>

    <h2>体操動画を見る</h2>
    <button class="video-btn" onclick="watchVideo('かんたん', 'https://www.youtube.com/watch?v=qP3jtYbfUK0&t=14s')">かんたん（視聴）</button>
    <button class="video-btn" onclick="watchVideo('ふつう', 'https://www.youtube.com/watch?v=hKxXh1GrRjI')">ふつう（視聴）</button>
    <button class="video-btn" onclick="watchVideo('むずかしい', 'https://www.youtube.com/watch?v=QjmdV01-TqI')">むずかしい（視聴）</button>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxrxgT6OwQa5WNKiOIzY36dWUhskOX6Q6drJvvXiJwJuG_zlHwswpvhg4CIG6Hu-Mnqvw/exec'; // ここに先ほどのURLを貼り付け
        let userId = "";

        // LIFFの初期化
        liff.init({ liffId: '2009551698-vafUFmck' }) // LINE Developersで発行したID
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = liff.getDecodedIDToken();
                    userId = profile.sub; // LINEのユーザーIDを取得
                }
            });

        // GASにデータを送る関数
        function sendData(type, value) {
            const data = {
                userId: userId,
                type: type,
                value: value
            };

            // GASのdoPostへデータを送信
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // GASへのPOSTでよく使われる設定
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                alert("記録しました！");
            }).catch(err => alert("エラー: " + err));
        }

        // 動画視聴のログを記録してYouTubeを開く
        function watchVideo(level, url) {
            sendData('video', level); // ログを送信
            window.location.href = url; // YouTubeへ移動
        }
    </script>
</body>
</html>
