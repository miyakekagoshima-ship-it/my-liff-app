<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お茶の記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { width: 80%; padding: 15px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc; }
        .tea-btn { background-color: #eaffea; }
        .completed-msg { color: #008000; font-size: 18px; font-weight: bold; padding: 20px; background-color: #f0fff0; border-radius: 10px; margin: 10px; border: 1px solid #008000; }
    </style>
</head>
<body>

    <h2>🍵 お茶の記録</h2>
    <div id="tea-section">
        <p>今日飲んだ本数を教えてください</p>
        <button class="tea-btn" onclick="sendData(0)">0本</button>
        <button class="tea-btn" onclick="sendData(1)">1本</button>
        <button class="tea-btn" onclick="sendData(2)">2本</button>
    </div>

<script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxrxgT6OwQa5WNKiOIzY36dWUhskOX6Q6drJvvXiJwJuG_zlHwswpvhg4CIG6Hu-Mnqvw/exec";
        let userId = "";

        function getTodayString() {
            const now = new Date();
            return now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
        }

        function checkDailyLimit() {
            if (localStorage.getItem('last_tea_date') === getTodayString()) {
                document.getElementById('tea-section').innerHTML = '<div class="completed-msg">✅ 本日のお茶の記録は完了しています</div>';
            }
        }

        // ▼【復活】画面が開いた時のチェック
        document.addEventListener("DOMContentLoaded", checkDailyLimit);

 // 開始用のLIFF ID
        liff.init({ liffId: "2009684447-p1k1lcRv" }) 
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    liff.getProfile().then(profile => {
                        userId = profile.userId;
                        document.getElementById('submitBtn').disabled = false;
                        document.getElementById('submitBtn').innerText = "記録を送信する";
                    }).catch(err => {
                        // ★プロフィール取得失敗時のエラーを表示
                        alert("LINE IDの取得に失敗しました: " + err);
                    });
                }
            }).catch(err => {
                // ★LIFF初期化失敗時のエラーを表示
                alert("LIFFの立ち上げに失敗しました: " + err);
            });

        function sendData(value) {
            // ▼【復活】送信した瞬間に「今日の日付」を記憶させて画面を切り替える
            localStorage.setItem('last_tea_date', getTodayString());
            checkDailyLimit();

            const submitBtn = document.querySelectorAll('.tea-btn');
            submitBtn.forEach(btn => btn.disabled = true);

            const data = { userId: userId, type: 'tea', value: value };
            
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                let msgText = '🍵 【お茶の記録】\n本日（' + getTodayString() + '）：' + value + '杯 飲みました！';

                if (liff.isInClient()) {
                    liff.sendMessages([{ 'type': 'text', 'text': msgText }]).then(() => {
                        document.getElementById('tea-section').innerHTML = '<div class="completed-msg">✅ 本日のお茶の記録は完了しています</div>';
                    }).catch((err) => {
                        document.getElementById('tea-section').innerHTML = '<div class="completed-msg">✅ 本日のお茶の記録は完了しています</div>';
                    });
                } else {
                    document.getElementById('tea-section').innerHTML = '<div class="completed-msg">✅ 本日のお茶の記録は完了しています</div>';
                }
            }).catch(err => {
                alert("エラーが発生しました: " + err);
                submitBtn.forEach(btn => btn.disabled = false);
            });
        }
    </script>
</body>
</html>
