<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お茶の飲用記録</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f0f4f0; color: #333; }
        .header { text-align: center; margin-bottom: 25px; padding: 0 5px; }
        
        /* タイトル文字を大きく、視認性を向上 */
        h2 { font-size: 22px; color: #2d5a27; line-height: 1.4; margin-bottom: 15px; font-weight: bold; }
        .week-title { font-size: 16px; color: #555; margin-bottom: 10px; display: block; }
        
        .day-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.08); }
        .day-card h3 { margin: 0 0 15px 0; font-size: 18px; color: #2d5a27; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }
        
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .label-text { font-weight: bold; font-size: 16px; color: #444; }
        
        /* プルダウンの操作性を向上 */
        select { 
            padding: 12px; 
            border: 2px solid #00B900; 
            border-radius: 10px; 
            font-size: 18px; 
            width: 120px; 
            background-color: #fff;
            color: #333;
            font-weight: bold;
            text-align: center;
        }

        .submit-btn { width: 100%; padding: 18px; background-color: #00B900; color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 0 #008000; }
        .submit-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #008000; }
        .submit-btn:disabled { background-color: #ccc; box-shadow: none; transform: none; }
        
        .completed-msg { text-align: center; color: #2d5a27; font-size: 18px; font-weight: bold; padding: 40px 20px; background-color: #eaffea; border-radius: 15px; border: 2px solid #00B900; margin-top: 20px; }
        .close-btn { width: 100%; padding: 18px; background-color: #666; color: white; border: none; border-radius: 12px; font-size: 18px; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="header">
        <span id="week-display" class="week-title">第1週</span>
        <h2 id="main-instruction">大学からお渡ししたお茶の粉末を、1日に何本飲まれたか教えてください</h2>
    </div>

    <div id="form-wrapper">
        <form id="weeklyForm">
            <div id="inputs-container"></div>
            <button type="submit" id="submitBtn" class="submit-btn" disabled>読み込み中...</button>
        </form>
    </div>

    <div id="completed-msg" style="display: none;">
        <div class="completed-msg">
            ✅ 1週間分の記録を送信しました。<br>ご協力ありがとうございました。
        </div>
        <button class="close-btn" onclick="liff.closeWindow()">画面を閉じる</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx_L-7DQEEZ4ybF_35fKbQfxFe9EFnWhY-QGgXpGwBxAUHdJEPoJbPPWkpQ9XQVIBPa/exec"; 
        let userId = "";

        // ==========================================
        // 🔧 【週ごとの設定】
        // ==========================================
        const weekNumber = 2;
const weekDates = ["8/7(金)", "8/8(土)", "8/9(日)", "8/10(月)", "8/11(火)", "8/12(水)", "8/13(木)"];
        // ==========================================

        document.getElementById('week-display').innerText = `第${weekNumber}週`;

        const storageKey = `submitted_tea_week_${weekNumber}`;
        if (localStorage.getItem(storageKey) === 'true') {
            document.getElementById('form-wrapper').innerHTML = `
                <div class="completed-msg">
                    ✅ 第${weekNumber}週目の記録は<br>送信済みです。
                </div>
                <button class="close-btn" onclick="liff.closeWindow()">画面を閉じる</button>
            `;
        }

        const container = document.getElementById('inputs-container');
        weekDates.forEach((date, index) => {
            container.innerHTML += `
                <div class="day-card">
                    <h3>${date}</h3>
                    <div class="input-row">
                        <span class="label-text">飲んだ本数（0～2本）</span>
                        <select id="tea-${index}" required>
                            <option value="0">0本</option>
                            <option value="1">1本</option>
                            <option value="2">2本</option>
                        </select>
                    </div>
                </div>
            `;
        });

        liff.init({ liffId: "ここに各週のLIFF_ID" }) 
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    liff.getProfile().then(profile => {
                        userId = profile.userId;
                        document.getElementById('submitBtn').disabled = false;
                        document.getElementById('submitBtn').innerText = "記録を送信する";
                    });
                }
            });

        document.getElementById('weeklyForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "送信中...";

            let weeklyData = [];
            let msgText = `📅 【第${weekNumber}週目のお茶記録】\n`;

            weekDates.forEach((date, index) => {
                let teaVal = document.getElementById(`tea-${index}`).value;
                weeklyData.push({ week: weekNumber, date: date, tea: teaVal });
                msgText += `${date}：🍵 ${teaVal}本\n`;
            });

            const data = { userId: userId, type: 'weekly_record', value: weeklyData };

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                localStorage.setItem(storageKey, 'true');
                if (liff.isInClient()) {
                    liff.sendMessages([{ 'type': 'text', 'text': msgText.trim() }]).then(() => {
                        document.getElementById('form-wrapper').style.display = 'none';
                        document.getElementById('completed-msg').style.display = 'block';
                    });
                } else {
                    document.getElementById('form-wrapper').style.display = 'none';
                    document.getElementById('completed-msg').style.display = 'block';
                }
            }).catch(err => {
                alert("エラーが発生しました: " + err);
                submitBtn.disabled = false;
                submitBtn.innerText = "記録を送信する";
            });
        });
    </script>
</body>
</html>
